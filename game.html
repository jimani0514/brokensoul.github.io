  <!-- ============================================================
       스크린샷 슬라이더 JavaScript
       - 총 7장 이미지를 한 번에 3장씩 보여줌
       - 좌/우 버튼 클릭 시 1장씩 이동 (최대 이동 인덱스: 4)
       - 뷰포트 크기 변경 시(resize) 아이템 너비 자동 재계산
       ============================================================ -->
  <script>
  (function () {
    // ── 설정 상수 ──────────────────────────────────────────────
    var TOTAL_ITEMS  = 7;   // 전체 스크린샷 수
    var VISIBLE_ITEMS = 3;  // 동시에 보이는 수
    var GAP_PX       = 10;  // 아이템 사이 간격 (px), CSS gap과 일치
    var MAX_INDEX    = TOTAL_ITEMS - VISIBLE_ITEMS; // 최대 이동 인덱스 (= 4)

    // ── DOM 참조 ───────────────────────────────────────────────
    var track      = document.getElementById('sliderTrack');
    var viewport   = document.getElementById('sliderViewport');
    var prevBtn    = document.getElementById('sliderPrev');
    var nextBtn    = document.getElementById('sliderNext');
    var indicators = document.getElementById('sliderIndicators');

    var currentIndex = 0; // 현재 첫 번째로 보이는 이미지 인덱스

    // ── 인디케이터 점 생성 (이동 가능한 단계 수만큼) ───────────
    for (var i = 0; i <= MAX_INDEX; i++) {
      (function (idx) {
        var dot = document.createElement('button');
        dot.className = 'slider-dot' + (idx === 0 ? ' active' : '');
        dot.setAttribute('aria-label', (idx + 1) + '번째 위치');
        dot.addEventListener('click', function () { goTo(idx); });
        indicators.appendChild(dot);
      })(i);
    }

    // ── 각 슬라이더 아이템의 너비를 뷰포트 기준으로 계산·적용 ─
    function setItemWidths() {
      var vpWidth  = viewport.offsetWidth;
      // 3개 아이템과 2개 갭을 뺀 나머지를 3등분
      var itemW    = (vpWidth - GAP_PX * (VISIBLE_ITEMS - 1)) / VISIBLE_ITEMS;
      var items    = track.querySelectorAll('.slider-item');
      for (var j = 0; j < items.length; j++) {
        items[j].style.width = itemW + 'px';
      }
      // 너비 변경 후 애니메이션 없이 즉시 위치 재설정
      updatePosition(false);
    }

    // ── 트랙 위치 갱신 ─────────────────────────────────────────
    function updatePosition(animate) {
      var vpWidth = viewport.offsetWidth;
      var itemW   = (vpWidth - GAP_PX * (VISIBLE_ITEMS - 1)) / VISIBLE_ITEMS;
      var offset  = currentIndex * (itemW + GAP_PX);

      // 애니메이션 여부에 따라 transition 조절
      track.style.transition = (animate === false)
        ? 'none'
        : 'transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
      track.style.transform  = 'translateX(-' + offset + 'px)';

      // 좌/우 버튼 비활성화 처리
      prevBtn.disabled = (currentIndex === 0);
      nextBtn.disabled = (currentIndex === MAX_INDEX);

      // 인디케이터 점 활성 상태 갱신
      var dots = indicators.querySelectorAll('.slider-dot');
      for (var k = 0; k < dots.length; k++) {
        if (k === currentIndex) {
          dots[k].classList.add('active');
        } else {
          dots[k].classList.remove('active');
        }
      }
    }

    // ── 특정 인덱스로 이동 ─────────────────────────────────────
    function goTo(index) {
      currentIndex = Math.max(0, Math.min(index, MAX_INDEX));
      updatePosition(true);
    }

    // ── 버튼 이벤트 바인딩 ─────────────────────────────────────
    prevBtn.addEventListener('click', function () { goTo(currentIndex - 1); });
    nextBtn.addEventListener('click', function () { goTo(currentIndex + 1); });

    // ── 초기 실행 및 창 크기 변경 대응 ────────────────────────
    setItemWidths();
    window.addEventListener('resize', setItemWidths);
  })();
  </script>
